<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星賀・船越 青物攻略チェックアプリ</title>
  <style>
    :root {
      --bg: #eef3f8;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #dbe3ec;
      --primary: #0f172a;
      --primary2: #1d4ed8;
      --ok: #166534;
      --okbg: #dcfce7;
      --mid: #92400e;
      --midbg: #fef3c7;
      --bad: #991b1b;
      --badbg: #fee2e2;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 14px;
    }
    h1 { margin: 0 0 6px; font-size: 24px; line-height: 1.2; }
    h2 { margin: 0 0 12px; font-size: 18px; line-height: 1.3; }
    .sub { color: var(--muted); font-size: 13px; margin-bottom: 14px; }
    .panel {
      background: var(--card);
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 14px;
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.06);
      border: 1px solid rgba(15, 23, 42, 0.04);
    }
    .hero {
      background: linear-gradient(135deg, var(--primary), var(--primary2));
      color: #fff;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .score {
      font-size: 30px;
      font-weight: 800;
      margin: 6px 0 10px;
      letter-spacing: 1px;
    }
    .label {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .label.good { background: var(--okbg); color: var(--ok); }
    .label.mid { background: var(--midbg); color: var(--mid); }
    .label.bad { background: var(--badbg); color: var(--bad); }
    .hero .label { background: rgba(255,255,255,0.18); color: #fff; }
    .meta { font-size: 14px; line-height: 1.7; }
    .small { font-size: 12px; color: var(--muted); line-height: 1.6; }
    .hero .small { color: rgba(255,255,255,0.82); }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    select, input, textarea, button {
      font-size: 16px;
      padding: 10px 12px;
      border-radius: 10px;
    }
    select, input, textarea {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      width: 100%;
    }
    button {
      border: none;
      background: var(--primary);
      color: #fff;
      cursor: pointer;
      font-weight: 700;
    }
    button.secondary {
      background: #e5e7eb;
      color: #111827;
    }
    .status {
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
    }
    .grid2 {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .grid3 {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
    .stat {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      background: #fbfcfe;
    }
    .stat .k {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .stat .v {
      font-size: 15px;
      font-weight: 700;
    }
    .week-grid {
      display: grid;
      gap: 10px;
    }
    .day-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: #fcfcfd;
    }
    .day-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .day-date {
      font-weight: 800;
      font-size: 15px;
    }
    .day-stars {
      font-weight: 800;
      font-size: 20px;
    }
    .method {
      margin-top: 6px;
      font-size: 14px;
      font-weight: 700;
    }
    .bullet { margin-top: 6px; font-size: 14px; line-height: 1.7; }
    .log-item {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      background: #fbfcfe;
      margin-bottom: 8px;
    }
    .log-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 13px;
      margin-bottom: 6px;
    }
    .log-title {
      font-weight: 700;
    }
    .danger {
      background: #b91c1c;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
    }
    @media (max-width: 700px) {
      .grid2, .grid3 { grid-template-columns: 1fr; }
      .score { font-size: 28px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>星賀・船越 青物攻略チェックアプリ</h1>
    <div class="sub">前日予測 / 当日判断 / 今日から1週間おすすめ / 実データ / 釣果ログ</div>

    <div class="panel hero">
      <h2>今日の結論</h2>
      <div id="heroLabel" class="label">短時間様子見</div>
      <div id="heroScore" class="score">★★</div>
      <div id="heroMethod" class="meta">おすすめ：カゴ＋泳がせ</div>
      <div id="heroComment" class="meta">潮まずまず。風良い。ベイト期待。</div>
      <div class="small" id="heroNote">星賀・船越ごとの補正を反映しています。</div>
    </div>

    <div class="panel">
      <div class="row">
        <label for="spotSelect">場所</label>
        <select id="spotSelect" style="max-width:220px;">
          <option value="seiga">星賀漁港</option>
          <option value="funakoshi">船越漁港</option>
        </select>

        <button id="refreshBtn">おすすめを更新</button>
        <button id="fetchBtn" class="secondary">実データ更新</button>
      </div>
      <div class="status" id="statusText">初期表示中です。</div>
    </div>

    <div class="panel">
      <h2>実データ</h2>
      <div class="grid2">
        <div class="stat">
          <div class="k">潮</div>
          <div class="v" id="liveTide">唐津 4101 / 未取得</div>
        </div>
        <div class="stat">
          <div class="k">風</div>
          <div class="v" id="liveWind">未取得</div>
        </div>
        <div class="stat">
          <div class="k">水温</div>
          <div class="v" id="liveTemp">未取得</div>
        </div>
        <div class="stat">
          <div class="k">おすすめ釣法</div>
          <div class="v" id="liveMethod">未計算</div>
        </div>
      </div>
      <div class="status" id="liveDataNote">潮は MSIL、風は Open-Meteo、釣果ログはブラウザ保存を使います。</div>
    </div>

    <div class="panel">
      <h2>今日の当日判断</h2>
      <div id="todayBox"></div>
    </div>

    <div class="panel">
      <h2>明日の前日予測</h2>
      <div id="tomorrowBox"></div>
    </div>

    <div class="panel">
      <h2>今日から1週間おすすめ</h2>
      <div class="week-grid" id="weekBox"></div>
    </div>

    <div class="panel">
      <h2>釣果ログ</h2>
      <div class="grid3">
        <div>
          <label class="small">日付</label>
          <input type="date" id="logDate" />
        </div>
        <div>
          <label class="small">場所</label>
          <select id="logSpot">
            <option value="seiga">星賀漁港</option>
            <option value="funakoshi">船越漁港</option>
          </select>
        </div>
        <div>
          <label class="small">時間帯</label>
          <select id="logTimeBand">
            <option value="朝">朝</option>
            <option value="昼">昼</option>
            <option value="夕">夕</option>
            <option value="夜">夜</option>
          </select>
        </div>
        <div>
          <label class="small">釣法</label>
          <select id="logMethod">
            <option value="カゴ">カゴ</option>
            <option value="餌">餌</option>
            <option value="ルアー">ルアー</option>
            <option value="泳がせ">泳がせ</option>
          </select>
        </div>
        <div>
          <label class="small">釣果</label>
          <select id="logResult">
            <option value="釣れた">釣れた</option>
            <option value="反応あり">反応あり</option>
            <option value="不発">不発</option>
          </select>
        </div>
        <div>
          <label class="small">サイズ・魚種</label>
          <input type="text" id="logFish" placeholder="例：ヤズ 45cm" />
        </div>
      </div>

      <div style="margin-top:10px;">
        <label class="small">メモ</label>
        <textarea id="logMemo" rows="3" placeholder="ベイト、海面、風、立ち位置など"></textarea>
      </div>

      <div class="row" style="margin-top:10px;">
        <button id="saveLogBtn">釣果ログを保存</button>
        <button id="clearLogBtn" class="secondary">全ログ削除</button>
      </div>

      <div class="status">保存先はこのブラウザ内です。まずは自分用ログとして使います。</div>

      <div style="margin-top:12px;" id="logList"></div>
    </div>
  </div>

  <script>
    const LOG_KEY = "seiga-funakoshi-log-v1";

    const spotRules = {
      seiga: {
        name: "星賀漁港",
        tendency: "回遊待ち重視。潮・まずめ・ベイト・海面変化を強く評価。",
        tideStation: "唐津 / 4101",
        lat: 33.413,
        lon: 129.873,
        weights: { tide: 3, mazume: 3, wind: 2, temp: 2, bait: 3, surface: 3, method: 2 }
      },
      funakoshi: {
        name: "船越漁港",
        tendency: "風と立ち位置相性を重視。潮が弱い日でも釣法の工夫を評価。",
        tideStation: "唐津 / 4101",
        lat: 33.452,
        lon: 129.969,
        weights: { tide: 2, mazume: 2, wind: 3, temp: 2, bait: 2, surface: 2, method: 3 }
      }
    };

    function addDays(base, plus) {
      const d = new Date(base);
      d.setDate(d.getDate() + plus);
      return d;
    }

    function fmtDate(d) {
      const m = d.getMonth() + 1;
      const day = d.getDate();
      const w = ["日", "月", "火", "水", "木", "金", "土"][d.getDay()];
      return `${m}/${day}（${w}）`;
    }

    function ymd(d = new Date()) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function ymdCompact(d = new Date()) {
      return ymd(d).replaceAll("-", "");
    }

    function starText(score) {
      if (score >= 8) return "★★★";
      if (score >= 5) return "★★";
      return "★";
    }

    function bandLabel(score) {
      if (score >= 8) return "本命";
      if (score >= 5) return "候補";
      return "見送り寄り";
    }

    function todayJudgeLabel(score) {
      if (score >= 15) return { text: "GO", cls: "good" };
      if (score >= 11) return { text: "朝夕まずめだけGO", cls: "mid" };
      if (score >= 7) return { text: "短時間様子見", cls: "mid" };
      return { text: "見送り", cls: "bad" };
    }

    function tomorrowJudgeLabel(score) {
      if (score >= 13) return { text: "本命日", cls: "good" };
      if (score >= 9) return { text: "候補日", cls: "mid" };
      if (score >= 6) return { text: "短時間候補", cls: "mid" };
      return { text: "見送り寄り", cls: "bad" };
    }

    function methodRecommend(input) {
      if (input.bait >= 2 && input.surface >= 2 && input.tide >= 2) return "カゴ＋泳がせ";
      if (input.bait >= 2 && input.surface >= 2) return "ルアー＋泳がせ";
      if (input.tide >= 2 && input.mazume >= 2) return "カゴ＋餌";
      if (input.surface >= 2) return "ルアー短時間";
      return "餌＋カゴ";
    }

    function timeBand(input) {
      if (input.mazume === 3) return "朝本命";
      if (input.mazume === 2) return "夕方候補";
      if (input.mazume === 1) return "朝夕候補";
      return "終日弱め";
    }

    function commentText(input, spot) {
      const parts = [];

      if (input.tide >= 2) parts.push("潮が動く");
      else if (input.tide === 1) parts.push("潮まずまず");
      else parts.push("潮弱い");

      if (input.wind >= 2) parts.push("風良い");
      else if (input.wind === 1) parts.push("風やや不利");
      else parts.push("風不利");

      if (spot === "seiga") {
        if (input.bait >= 2) parts.push("ベイト期待");
        if (input.surface >= 2) parts.push("海面変化あり");
      } else {
        if (input.method >= 2) parts.push("釣法の自由度あり");
      }

      return parts.join("。");
    }

    function normalizeWeightedScore(raw) {
      if (raw >= 75) return 9;
      if (raw >= 58) return 7;
      if (raw >= 42) return 5;
      if (raw >= 28) return 3;
      return 1;
    }

    function calcWeightedDay(input, spot) {
      const w = spotRules[spot].weights;

      const raw =
        input.tide * w.tide +
        input.mazume * w.mazume +
        input.wind * w.wind +
        input.temp * w.temp +
        input.bait * w.bait +
        input.surface * w.surface +
        input.method * w.method;

      const score = normalizeWeightedScore(raw);

      return {
        raw,
        score,
        stars: starText(score),
        band: bandLabel(score),
        method: methodRecommend(input),
        timeBand: timeBand(input),
        comment: commentText(input, spot)
      };
    }

    function buildDummyWeekData(spot) {
      const base = new Date();

      const patterns = spot === "seiga"
        ? [
            { tide: 3, mazume: 3, wind: 2, temp: 2, bait: 2, surface: 2, method: 2 },
            { tide: 2, mazume: 2, wind: 1, temp: 2, bait: 2, surface: 1, method: 2 },
            { tide: 1, mazume: 1, wind: 1, temp: 1, bait: 1, surface: 1, method: 1 },
            { tide: 2, mazume: 1, wind: 2, temp: 2, bait: 1, surface: 1, method: 2 },
            { tide: 3, mazume: 2, wind: 2, temp: 2, bait: 3, surface: 2, method: 3 },
            { tide: 2, mazume: 2, wind: 2, temp: 1, bait: 2, surface: 2, method: 2 },
            { tide: 1, mazume: 0, wind: 1, temp: 1, bait: 0, surface: 0, method: 1 }
          ]
        : [
            { tide: 2, mazume: 2, wind: 3, temp: 2, bait: 2, surface: 1, method: 3 },
            { tide: 2, mazume: 1, wind: 2, temp: 2, bait: 1, surface: 1, method: 2 },
            { tide: 1, mazume: 1, wind: 1, temp: 1, bait: 1, surface: 1, method: 1 },
            { tide: 2, mazume: 2, wind: 2, temp: 2, bait: 2, surface: 1, method: 3 },
            { tide: 3, mazume: 2, wind: 2, temp: 2, bait: 2, surface: 2, method: 3 },
            { tide: 2, mazume: 2, wind: 3, temp: 1, bait: 1, surface: 1, method: 2 },
            { tide: 1, mazume: 0, wind: 1, temp: 1, bait: 0, surface: 0, method: 1 }
          ];

      return patterns.map((p, i) => ({
        date: addDays(base, i),
        input: p,
        result: calcWeightedDay(p, spot)
      }));
    }

    function renderLabel(obj) {
      return `<span class="label ${obj.cls}">${obj.text}</span>`;
    }

    function renderSummary(boxId, title, labelObj, result, tendency) {
      const box = document.getElementById(boxId);
      box.innerHTML = `
        ${renderLabel(labelObj)}
        <div class="score">${result.stars}</div>
        <div class="meta">
          <div><strong>${title}</strong></div>
          <div class="bullet">時間帯：${result.timeBand}</div>
          <div class="bullet">おすすめ釣法：${result.method}</div>
          <div class="bullet">コメント：${result.comment}</div>
          <div class="small" style="margin-top:8px;">補正：${tendency}</div>
        </div>
      `;
    }

    function renderWeek(list) {
      const weekBox = document.getElementById("weekBox");
      weekBox.innerHTML = list.map(day => `
        <div class="day-card">
          <div class="day-top">
            <div class="day-date">${fmtDate(day.date)}</div>
            <div class="day-stars">${day.result.stars}</div>
          </div>
          <div class="small">${day.result.band} / ${day.result.timeBand}</div>
          <div class="bullet">${day.result.comment}</div>
          <div class="method">おすすめ：${day.result.method}</div>
        </div>
      `).join("");
    }

    function renderHero(today, spot) {
      const labelObj = todayJudgeLabel(today.result.score + 7);
      document.getElementById("heroLabel").textContent = labelObj.text;
      document.getElementById("heroScore").textContent = today.result.stars;
      document.getElementById("heroMethod").textContent = `おすすめ：${today.result.method}`;
      document.getElementById("heroComment").textContent = today.result.comment;
      document.getElementById("heroNote").textContent = `${spotRules[spot].name} / ${spotRules[spot].tendency}`;
    }

    function renderAll() {
      const spot = document.getElementById("spotSelect").value;
      const week = buildDummyWeekData(spot);
      const tendency = spotRules[spot].tendency;

      const today = week[0];
      const tomorrow = week[1];

      renderHero(today, spot);

      renderSummary(
        "todayBox",
        "今日の総合判定",
        todayJudgeLabel(today.result.score + 7),
        today.result,
        tendency
      );

      renderSummary(
        "tomorrowBox",
        "明日の前日予測",
        tomorrowJudgeLabel(tomorrow.result.score + 5),
        tomorrow.result,
        tendency
      );

      renderWeek(week);

      document.getElementById("statusText").textContent =
        `${spotRules[spot].name} のおすすめを更新しました。現在は判定アルゴリズム + API接続の段階です。`;
      document.getElementById("liveTide").textContent = `${spotRules[spot].tideStation} / 未取得`;
      document.getElementById("liveMethod").textContent = today.result.method;
      document.getElementById("logSpot").value = spot;
    }

    function parseMsilTide(raw) {
      const start = new Date(raw.time);
      const intervalSec = Number(raw.interval || 60);
      const tide = Array.isArray(raw.tide) ? raw.tide : [];
      if (!raw.time || tide.length === 0) return null;

      const now = new Date();
      const points = tide.map((v, i) => ({
        time: new Date(start.getTime() + i * intervalSec * 1000),
        level: Number(v)
      }));

      const future = points.filter(p => p.time >= now);
      const current = future[0] || points[0];
      const later = future.find(p => p.time >= new Date(current.time.getTime() + 2 * 60 * 60 * 1000)) || future[future.length - 1] || current;

      const diff = later.level - current.level;
      const abs = Math.abs(diff);

      let tideText = "潮弱い";
      if (abs >= 50) tideText = "潮かなり動く";
      else if (abs >= 25) tideText = "潮が動く";
      else if (abs >= 10) tideText = "潮まずまず";

      return {
        stationCode: raw.stationCode,
        diff: Math.round(abs),
        direction: diff > 0 ? "上げ" : diff < 0 ? "下げ" : "停滞",
        tideText
      };
    }

    async function fetchTideData(spot) {
      const url = `/api/msil-tide?spot=${encodeURIComponent(spot)}`;
      const res = await fetch(url);
      if (!res.ok) {
        const txt = await res.text();
        throw new Error(`潮取得失敗: ${txt.slice(0, 120)}`);
      }
      return await res.json();
    }

    async function fetchWindData(spot) {
      const info = spotRules[spot];
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${info.lat}&longitude=${info.lon}&current=wind_speed_10m,wind_direction_10m&timezone=Asia%2FTokyo`;
      const res = await fetch(url);
      if (!res.ok) throw new Error("風取得失敗");
      const json = await res.json();
      const current = json.current || {};
      return {
        speed: current.wind_speed_10m,
        dir: current.wind_direction_10m
      };
    }

    function directionLabel(deg) {
      if (deg == null || Number.isNaN(Number(deg))) return "-";
      const d = Number(deg);
      if (d >= 337.5 || d < 22.5) return "北";
      if (d < 67.5) return "北東";
      if (d < 112.5) return "東";
      if (d < 157.5) return "南東";
      if (d < 202.5) return "南";
      if (d < 247.5) return "南西";
      if (d < 292.5) return "西";
      return "北西";
    }

    async function fetchLiveData() {
      const spot = document.getElementById("spotSelect").value;
      document.getElementById("statusText").textContent = "実データ取得中です…";

      try {
        const [tideRaw, windRaw] = await Promise.all([
          fetchTideData(spot),
          fetchWindData(spot)
        ]);

        const tideInfo = parseMsilTide(tideRaw);

        if (tideInfo) {
          document.getElementById("liveTide").textContent =
            `${spotRules[spot].tideStation} / ${tideInfo.tideText} / ${tideInfo.direction} / 2時間差 ${tideInfo.diff}cm`;
        } else {
          document.getElementById("liveTide").textContent = `${spotRules[spot].tideStation} / 判定不能`;
        }

        document.getElementById("liveWind").textContent =
          `${directionLabel(windRaw.dir)} ${windRaw.speed ?? "-"} m/s`;

        document.getElementById("liveTemp").textContent = "次段階で接続";
        document.getElementById("liveDataNote").textContent =
          "潮は MSIL、風は Open-Meteo から取得しました。水温は次段階で接続します。";
        document.getElementById("statusText").textContent = "実データを更新しました。";
      } catch (err) {
        document.getElementById("statusText").textContent = "実データ更新でエラーが出ました。";
        document.getElementById("liveDataNote").textContent = String(err);
      }
    }

    function getLogs() {
      try {
        return JSON.parse(localStorage.getItem(LOG_KEY) || "[]");
      } catch {
        return [];
      }
    }

    function setLogs(logs) {
      localStorage.setItem(LOG_KEY, JSON.stringify(logs));
    }

    function renderLogs() {
      const logs = getLogs();
      const box = document.getElementById("logList");

      if (logs.length === 0) {
        box.innerHTML = `<div class="small">まだログはありません。</div>`;
        return;
      }

      box.innerHTML = logs.slice().reverse().map((log, idx) => `
        <div class="log-item">
          <div class="log-head">
            <div class="log-title">${log.date} / ${log.spotName} / ${log.timeBand}</div>
            <button class="danger" onclick="deleteLog(${logs.length - 1 - idx})">削除</button>
          </div>
          <div class="small">釣法：${log.method} / 結果：${log.result}</div>
          <div class="bullet">${log.fish || "魚種・サイズ未入力"}</div>
          <div class="small">${log.memo || "メモなし"}</div>
        </div>
      `).join("");
    }

    function saveLog() {
      const spot = document.getElementById("logSpot").value;
      const log = {
        date: document.getElementById("logDate").value || ymd(),
        spot,
        spotName: spotRules[spot].name,
        timeBand: document.getElementById("logTimeBand").value,
        method: document.getElementById("logMethod").value,
        result: document.getElementById("logResult").value,
        fish: document.getElementById("logFish").value.trim(),
        memo: document.getElementById("logMemo").value.trim()
      };

      const logs = getLogs();
      logs.push(log);
      setLogs(logs);
      renderLogs();
      document.getElementById("statusText").textContent = "釣果ログを保存しました。";
    }

    function clearLogs() {
      if (!confirm("全ログを削除しますか？")) return;
      localStorage.removeItem(LOG_KEY);
      renderLogs();
      document.getElementById("statusText").textContent = "全ログを削除しました。";
    }

    function deleteLog(index) {
      const logs = getLogs();
      logs.splice(index, 1);
      setLogs(logs);
      renderLogs();
      document.getElementById("statusText").textContent = "ログを削除しました。";
    }

    window.deleteLog = deleteLog;

    document.getElementById("spotSelect").addEventListener("change", renderAll);
    document.getElementById("refreshBtn").addEventListener("click", renderAll);
    document.getElementById("fetchBtn").addEventListener("click", fetchLiveData);
    document.getElementById("saveLogBtn").addEventListener("click", saveLog);
    document.getElementById("clearLogBtn").addEventListener("click", clearLogs);

    document.getElementById("logDate").value = ymd();
    renderAll();
    renderLogs();
  </script>
</body>
</html>
